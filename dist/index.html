    <script>
      // Aplica el tema antes del primer paint para evitar el flash de color
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (
            t === "dark" ||
            (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
